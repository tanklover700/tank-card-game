<!DOCTYPE html>
<html>
<head>
    <title>图片测试</title>
    <style>
        .image-container {
            display: inline-block;
            margin: 10px;
            text-align: center;
        }
        img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>本地图片测试</h1>
    
    <h2>地形图片</h2>
    <div class="image-container">
        <img src="images/平原.png" alt="平原">
        <p>平原</p>
    </div>
    <div class="image-container">
        <img src="images/森林.png" alt="森林">
        <p>森林</p>
    </div>
    <div class="image-container">
        <img src="images/沙漠.png" alt="沙漠">
        <p>沙漠</p>
    </div>
    <div class="image-container">
        <img src="images/雪地.png" alt="雪地">
        <p>雪地</p>
    </div>
    <div class="image-container">
        <img src="images/城市.png" alt="城市">
        <p>城市</p>
    </div>
    <div class="image-container">
        <img src="images/山地.png" alt="山地">
        <p>山地</p>
    </div>
    
    <h2>时间图片</h2>
    <div class="image-container">
        <img src="images/黎明.png" alt="黎明">
        <p>黎明</p>
    </div>
    <div class="image-container">
        <img src="images/白天.png" alt="白天">
        <p>白天</p>
    </div>
    <div class="image-container">
        <img src="images/黄昏.png" alt="黄昏">
        <p>黄昏</p>
    </div>
    <div class="image-container">
        <img src="images/夜晚.png" alt="夜晚">
        <p>夜晚</p>
    </div>
</body>
</html>
